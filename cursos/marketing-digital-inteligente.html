<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Meta tags serão preenchidas dinamicamente com dados do curso -->
<meta name="description" id="metaDesc" content="">
<meta name="keywords" id="metaKeywords" content="">
<title id="pageTitle"></title>
<link rel="canonical" id="canonicalUrl">
<link rel="icon" type="image/png" href="../assets/logo.png">
<link rel="apple-touch-icon" href="../assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-900:#0a1526;
    --navy-800:#0e1d36;
    --gold-500:#dda54a;
    --gold-400:#e9bd6c;
    --gold-300:#f2d193;
    --orange-600:#e8790f;
    --cream:#fdf9f0;
    --ink:#0a1526;
    --muted:#b7c1d4;
    --line:rgba(221,165,74,0.38);
    --radius-lg:18px;
    --radius-md:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    font-family:'Inter', system-ui, -apple-system, sans-serif;
    color:var(--ink);
    padding-bottom:78px;
  }
  a{text-decoration:none;color:inherit;}
  img{max-width:100%;display:block;}
  svg{display:block;}

  header.site{
    background:var(--cream);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 14px;
    border-bottom:1px solid #ecdfc0;
    gap:10px;
    position:relative;
    z-index:105;
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0;}
  .brand .crest{
    width:46px;height:46px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
  }
  .brand .crest img{
    width:100%;height:100%;object-fit:contain;
  }
  .brand .name-block h1{
    margin:0;
    font-family:'Playfair Display', Georgia, serif;
    font-size:0.98rem;
    letter-spacing:0.2px;
    color:var(--navy-900);
    font-weight:800;
    line-height:1.15;
    white-space:nowrap;
  }
  .brand .name-block p{
    margin:3px 0 0;
    font-size:0.52rem;
    letter-spacing:1.2px;
    color:var(--orange-600);
    font-weight:700;
    white-space:nowrap;
  }
  .hamburger{
    width:40px;height:40px;
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;
    background:transparent;border:none;cursor:pointer;flex:0 0 auto;
    position:relative;z-index:110;
  }
  .hamburger span{
    width:24px;height:2.5px;background:var(--navy-900);border-radius:2px;
    transition:transform .25s ease, opacity .2s ease;
  }
  body.menu-open .hamburger span:nth-child(1){transform:translateY(7.5px) rotate(45deg);}
  body.menu-open .hamburger span:nth-child(2){opacity:0;}
  body.menu-open .hamburger span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg);}

  .nav-menu{
    position:fixed;
    top:0;left:0;right:0;
    background:var(--navy-900);
    padding-top:78px;
    max-height:0;
    overflow:hidden;
    transition:max-height .3s ease;
    z-index:100;
  }
  body.menu-open .nav-menu{max-height:600px;}
  .nav-menu ul{list-style:none;margin:0;padding:8px 20px 24px;}
  .nav-menu li{border-bottom:1px solid var(--line);}
  .nav-menu a{
    display:block;
    padding:14px 4px;
    color:#fff;
    font-weight:600;
    font-size:0.98rem;
    font-family:'Playfair Display', Georgia, serif;
  }
  .nav-menu a:hover{color:var(--gold-400);}
  .nav-backdrop{
    position:fixed;inset:0;
    background:rgba(10,21,38,0.4);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
    z-index:90;
  }
  body.menu-open .nav-backdrop{opacity:1;pointer-events:auto;}

  main{max-width:640px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:16px;}

  .card{
    background:var(--navy-900);
    border:1px solid var(--line);
    border-radius:var(--radius-lg);
    padding:22px 20px;
    box-shadow:0 8px 24px rgba(10,21,38,0.15);
  }

  .hero-image{
    width:100%;
    max-height:300px;
    border-radius:var(--radius-lg);
    overflow:hidden;
    margin-bottom:16px;
  }
  .hero-image img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .video-container{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:var(--radius-lg);
    overflow:hidden;
    margin:20px 0;
  }
  .video-frame{
    width:100%;
    height:100%;
  }
  .video-frame iframe{
    width:100%;
    height:100%;
    border:none;
  }

  .course-header{
    margin-bottom:20px;
  }
  .course-header h1{
    margin:0 0 8px;
    font-family:'Playfair Display', Georgia, serif;
    font-size:1.4rem;
    color:#fff;
    font-weight:800;
  }
  .course-meta{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:12px;
  }
  .course-meta .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 12px;
    background:rgba(221,165,74,0.2);
    color:var(--gold-300);
    border-radius:20px;
    font-size:0.8rem;
    font-weight:600;
  }

  .course-info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin:16px 0;
  }
  .info-item{
    background:rgba(15,43,74,0.5);
    padding:12px;
    border-radius:var(--radius-md);
    border-left:3px solid var(--gold-400);
  }
  .info-label{
    display:block;
    font-size:0.75rem;
    color:var(--gold-300);
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin-bottom:4px;
  }
  .info-value{
    font-size:0.95rem;
    color:#fff;
    font-weight:600;
  }

  .course-content{
    color:var(--muted);
    line-height:1.7;
    font-size:0.95rem;
  }
  .course-content h3{
    margin:20px 0 12px;
    font-family:'Playfair Display', Georgia, serif;
    color:var(--gold-400);
    font-size:1.1rem;
    font-weight:700;
  }
  .course-content p{
    margin:0 0 12px;
    text-align:justify;
  }
  .course-content ul{
    margin:0 0 16px;
    padding-left:20px;
  }
  .course-content li{
    margin-bottom:8px;
    color:var(--muted);
  }
  .course-content li strong{
    color:var(--gold-300);
  }

  .btn-inscrever{
    display:block;
    padding:16px 24px;
    background:var(--gold-400);
    color:var(--navy-900);
    text-align:center;
    font-weight:700;
    font-size:1rem;
    border-radius:var(--radius-lg);
    border:none;
    cursor:pointer;
    transition:all .3s ease;
    margin:20px 0;
  }
  .btn-inscrever:hover{
    background:var(--gold-500);
    transform:scale(1.02);
    box-shadow:0 8px 24px rgba(221,165,74,0.3);
  }

  .btn-voltar{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    color:var(--gold-400);
    font-size:0.9rem;
    font-weight:600;
    transition:all .25s ease;
    margin-bottom:16px;
  }
  .btn-voltar:hover{
    color:var(--gold-500);
    gap:12px;
  }
  .btn-voltar svg{
    width:16px;height:16px;
  }

  footer.site{
    background:var(--navy-900);
    color:#fff;
    padding:20px;
    text-align:center;
    border-top:1px solid var(--line);
  }
  footer.site .socials{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-bottom:12px;
  }
  footer.site .socials a{
    width:32px;height:32px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(221,165,74,0.15);
    border-radius:50%;
    transition:all .25s ease;
  }
  footer.site .socials a:hover{
    background:var(--gold-400);
  }
  footer.site .socials svg{
    width:16px;height:16px;
    color:var(--gold-400);
  }
  footer.site .socials a:hover svg{
    color:var(--navy-900);
  }
  footer.site p{margin:0 0 8px;font-size:0.9rem;color:var(--muted);}
  footer.site .legal{display:flex;justify-content:center;gap:8px;font-size:0.8rem;flex-wrap:wrap;}
  footer.site .legal a{color:var(--gold-400);transition:color .25s;}
  footer.site .legal a:hover{color:#fff;}

  nav.mobile-nav{
    position:fixed;
    bottom:0;left:0;right:0;
    background:#fff;
    display:flex;
    justify-content:space-around;
    border-top:1px solid #ecdfc0;
    z-index:104;
    height:78px;
  }
  nav.mobile-nav a{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    color:#556074;
    font-weight:600;
    font-size:0.62rem;
    transition:color .25s;
  }
  nav.mobile-nav a:hover{color:var(--gold-500);}
  nav.mobile-nav a.active{color:var(--gold-500);}
  nav.mobile-nav svg{width:22px;height:22px;}
</style>
</head>

<script src="../dados-cursos.js"></script>
<script src="../gerenciador-cursos.js"></script>
<script>
  // Extrair ID do curso da URL
  function extrairIdCurso() {
    const pathname = window.location.pathname;
    const match = pathname.match(/\/([^\/]+)\.html$/);
    return match ? match[1] : null;
  }

  // Inicializar página de curso
  document.addEventListener('DOMContentLoaded', () => {
    const cursoId = extrairIdCurso();
    
    if (!cursoId) {
      document.getElementById('mainContent').innerHTML = '<section class="card"><h2>Erro</h2><p>Curso não encontrado.</p></section>';
      return;
    }

    const curso = obterCurso(cursoId);
    
    if (!curso) {
      document.getElementById('mainContent').innerHTML = '<section class="card"><h2>Erro</h2><p>Curso não encontrado na base de dados.</p></section>';
      return;
    }

    // Atualizar meta tags
    document.title = `${curso.titulo} — Karlyon Enterprise S.A.`;
    document.getElementById('metaDesc').setAttribute('content', curso.metaDescricao);
    document.getElementById('metaKeywords').setAttribute('content', `${curso.titulo}, ${curso.categoria}, cursos moçambique`);
    document.getElementById('canonicalUrl').setAttribute('href', `https://karlyon.co.mz/cursos/${curso.id}.html`);

    // Renderizar conteúdo do curso
    const mainContent = document.getElementById('mainContent');
    
    const html = `
      <a href="../academia.html" class="btn-voltar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Voltar aos Cursos
      </a>

      <div class="hero-image">
        <img src="${curso.imagem}" alt="${curso.titulo}" loading="lazy">
      </div>

      <section class="card course-header">
        <h1>${curso.titulo}</h1>
        <div class="course-meta">
          <span class="badge">${curso.emoji} ${curso.categoria}</span>
          <span class="badge">⏱️ ${curso.duracao}</span>
          <span class="badge">📍 ${curso.modalidade}</span>
        </div>
      </section>

      <section class="card">
        <div class="course-info-grid">
          <div class="info-item">
            <span class="info-label">Nível</span>
            <span class="info-value">${curso.nivel}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Preço</span>
            <span class="info-value">${curso.preco}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Certificado</span>
            <span class="info-value">${curso.certificado}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Modalidade</span>
            <span class="info-value">${curso.modalidade}</span>
          </div>
        </div>

        <button class="btn-inscrever" onclick="inscreverCurso('${curso.titulo}')">Inscrever-se Agora</button>
      </section>

      <section class="card">
        <h2 style="margin:0 0 16px;font-family:'Playfair Display', Georgia, serif;color:var(--gold-400);font-size:1.2rem;">▶️ Conheça o Curso</h2>
        <div class="video-container">
          <div class="video-frame">
            <iframe src="https://www.youtube.com/embed/${curso.videoYouTubeId}?rel=0" title="Vídeo explicativo de ${curso.titulo}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
        </div>
      </section>

      <section class="card course-content">
        ${curso.descricaoCompleta}
      </section>

      <section class="card">
        <h2 style="margin:0 0 16px;font-family:'Playfair Display', Georgia, serif;color:var(--gold-400);font-size:1.2rem;">📋 Requisitos</h2>
        <p>${curso.requisitos}</p>
        
        <button class="btn-inscrever" onclick="inscreverCurso('${curso.titulo}')">Inscrever-se Agora</button>
      </section>
    `;

    mainContent.innerHTML = html;
  });

  function inscreverCurso(nomeCurso) {
    if (gerenciador.usuarioLogado) {
      alert(`Ótimo, ${gerenciador.usuarioLogado.nome}! Inscrição registada para ${nomeCurso}.\n\nEntraremos em contacto em breve.`);
    } else {
      alert(`Por favor, faça login primeiro para se inscrever em ${nomeCurso}.`);
      window.location.href = '../academia.html';
    }
  }

  // Menu hamburger
  const menuToggle = document.getElementById('menuToggle');
  const navBackdrop = document.getElementById('navBackdrop');
  
  function closeMenu(){
    document.body.classList.remove('menu-open');
    menuToggle.setAttribute('aria-expanded','false');
  }
  
  menuToggle.addEventListener('click', () => {
    const isOpen = document.body.classList.toggle('menu-open');
    menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  });
  
  navBackdrop.addEventListener('click', closeMenu);
  document.querySelectorAll('.nav-menu a').forEach(a => a.addEventListener('click', closeMenu));
</script>
</body>
